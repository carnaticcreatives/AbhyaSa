<html lang="en">
<head>

<link rel="manifest" href="manifest.json">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream:     #faf7f2;
    --parchment: #f0ead8;
    --border:    #d4c9a8;
    --text:      #2c2416;
    --muted:     #7a6e58;
    --accent:    #8b2e0f;
    --accent2:   #c4762a;
    --shadow:    rgba(44,36,22,0.12);
  }
  html, body { height: 100%; background: var(--cream); color: var(--text);
    font-family: 'Source Sans 3', sans-serif; font-weight: 300; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(196,118,42,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 80%, rgba(139,46,15,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '❧'; position: fixed; bottom: 24px; right: 28px;
    font-size: 48px; color: var(--border); opacity: 0.5;
    pointer-events: none; z-index: 0;
  }
  .page {
    position: relative; z-index: 1; min-height: 100vh;
    display: grid; grid-template-columns: 1fr 420px 1fr;
    grid-template-rows: 1fr auto 1fr; align-items: center; padding: 40px 20px;
  }
  .card {
    grid-column: 2; grid-row: 2; background: #fff;
    border: 1px solid var(--border); border-radius: 2px;
    box-shadow: 0 1px 3px var(--shadow), 0 8px 32px var(--shadow);
    overflow: hidden; animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-header {
    background: var(--accent); padding: 20px 24px 16px;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-header::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 8px,
      rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 16px);
  }
  /* AbhyaSa SVG logo replaces header images and text */
  .card-body {
    padding: 100px 36px 32px;
    position: relative;
    background:
      linear-gradient(rgba(250,247,242,0.80), rgba(250,247,242,0.80)),
      url('Purandaradasa.jpg') center top / cover no-repeat;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 25px;
    margin-top: -18px;
  }

  #panel-login,
  #panel-signup {
    margin-top: 22px;
  }
  .tab-btn {
    flex: 1; background: none; border: none; padding: 10px 0 12px;
    font-family: 'Source Sans 3', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
    cursor: pointer; position: relative; transition: color 0.2s;
  }
  .tab-btn::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
    background: var(--accent); transform: scaleX(0); transition: transform 0.2s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after { transform: scaleX(1); }
  .panel { display: none; }
  .panel.active { display: block; animation: fade 0.2s ease; }
  @keyframes fade {
    from { opacity: 0; transform: translateX(6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 2px;
    font-family: 'Source Sans 3', sans-serif; font-size: 15px; font-weight: 300;
    color: var(--text); background: var(--cream); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(196,118,42,0.12); background: #fff;
  }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none;
    border-radius: 2px; font-family: 'Source Sans 3', sans-serif; font-size: 14px;
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 4px;
  }
  .btn-primary:hover  { background: #6e2409; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { margin-top: 14px; padding: 10px 14px; border-radius: 2px;
    font-size: 13.5px; line-height: 1.5; display: none; }
  .msg.error   { background: #fdf0ee; border: 1px solid #e8b4aa; color: #7a2015; display: block; }
  .msg.success { background: #edf6ee; border: 1px solid #9fcca2; color: #1e5220; display: block; }
  .msg.info    { background: #fdf8ee; border: 1px solid #e0c97a; color: #5c4210; display: block; }
  .card-footer { padding: 16px 36px 24px; background: var(--accent); border-top: 1px solid var(--parchment); text-align: center; }
  .card-footer a { font-size: 13px; color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s; }
  .card-footer a:hover { color: #f5d090; }
  .card-footer .sep { margin: 0 10px; color: var(--border); }
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    color: var(--border); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .subscribe-note {
    margin-top: 18px; padding: 14px 16px; background: var(--parchment);
    border: 1px solid var(--border); border-radius: 2px;
    font-size: 13px; color: var(--muted); line-height: 1.6; text-align: center;
  }
  .subscribe-note strong { color: var(--accent); }
  .subscribe-note a { color: var(--accent2); text-decoration: none; font-weight: 600; }
  .coupon-field { display: none; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) {
    .page { grid-template-columns: 1fr; padding: 20px 16px; }
    .card { grid-column: 1; }
    .card-header { padding: 16px 16px 12px; }
    .card-body   { padding: 28px 24px 24px; }
    .card-footer { padding: 14px 24px 20px; }

  }
</style>
</head>

    <div class="card-body">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">Sign In</button>

      <!-- LOGIN -->
      <div id="panel-login" class="panel active">

        <div class="field">

<!-- Supabase loaded locally — fixes Edge/Firefox tracking prevention -->
<script src="supabase.min.js"></script>


<script>
  const SUPABASE_URL  = 'https://wcpbbvurfbraqqqlpsro.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjcGJidnVyZmJyYXFxcWxwc3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODI5MTksImV4cCI6MjA5MDY1ODkxOX0.sVYdEtstoZAB94QXIDcHHLE9XPHCq2DPkmF7KEZtQes';
  
  let sb;
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    console.error('[Supabase] Failed to initialise — is supabase.min.js present in the same folder?', e);
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[SW] Registered, scope:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }

  // If already logged in with active subscription, go straight to app.
  // Skip if this is a password recovery redirect (?code= or #type=recovery).
  window.addEventListener('load', async () => {
    if (!sb) return;

    // Show message if user was redirected here because their subscription expired mid-session
    if (window.location.search.includes('reason=expired')) {
      showMsg('msg-login', 'info',
        'Your subscription has expired. Please renew to continue practising.');
      // Clean up the URL so the message doesn't persist across refreshes
      window.history.replaceState({}, '', window.location.pathname);
    }

    const isRecovery = window.location.hash.includes('type=recovery') ||
                       window.location.search.includes('code=');
    if (isRecovery) return;
    const { data: { session } } = await sb.auth.getSession();
    if (session && await hasActiveSubscription(session.user.id)) {
      window.location.href = 'app.html';
    }
  });

  function showTab(tab) {
    document.querySelector('.tabs').style.display =
      (tab === 'login' || tab === 'signup') ? '' : 'none';
    showPanel(tab);
    clearMessages();
  }

  function clearMessages() {
    document.querySelectorAll('.msg').forEach(m => { m.className = 'msg'; m.textContent = ''; });
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span>Please wait...'
      : (btnId === 'btn-login' ? 'Sign In' : 'Create Account');
  }

  let couponVisible = false;
  function toggleCoupon() {
    couponVisible = !couponVisible;
    document.getElementById('coupon-wrap').style.display = couponVisible ? 'block' : 'none';
    document.getElementById('coupon-toggle-link').textContent =
      couponVisible ? 'Hide coupon field' : 'Enter it here';
  }

  async function hasActiveSubscription(userId) {
    const { data } = await sb
      .from('subscriptions')
      .select('id')
      .eq('user_id', userId)
      .eq('status', 'active')
      .gt('expiry_date', new Date().toISOString())
      .maybeSingle();
    return !!data;
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) {
      showMsg('msg-login', 'error', 'Please enter your email and password.');
      return;
    }
    setLoading('btn-login', true);
    clearMessages();
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      setLoading('btn-login', false);
      showMsg('msg-login', 'error', error.message || 'Login failed. Please check your credentials.');
      return;
    }
    const active = await hasActiveSubscription(data.user.id);
    setLoading('btn-login', false);
    if (active) {
      window.location.href = 'app.html';
    } else {
      showMsg('msg-login', 'info', 'No active subscription found. Please contact carnaticcreatives@gmail.com to subscribe');
    }
  }

    // ── REPLACE the existing doSignup() function in index.html with this ───────
  // The only change: coupon activation now calls the Edge Function instead of
  // doing three separate client-side DB operations.

    async function doSignup() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const coupon   = document.getElementById('signup-coupon').value.trim().toUpperCase();

    if (!name || !email || !password) {
      showMsg('msg-signup', 'error', 'Please fill in all fields.');
      return;
    }
    if (password.length < 8) {
      showMsg('msg-signup', 'error', 'Password must be at least 8 characters.');
      return;
    }

    setLoading('btn-signup', true);
    clearMessages();

    // ── Step 1: Create the auth account ─────────────────────────────────────
    const { data, error } = await sb.auth.signUp({
      email, password, options: { data: { full_name: name } }
    });
    if (error) {
      setLoading('btn-signup', false);
      showMsg('msg-signup', 'error', error.message || 'Signup failed. Please try again.');
      return;
    }

    const userId = data.user && data.user.id;
    // Use the session token returned directly from signUp — don't call getSession()
    const token  = data.session && data.session.access_token;

    // ── Step 2: Create the profile row ──────────────────────────────────────
    if (userId) {
      await sb.from('profiles').insert({
        id: userId, full_name: name, email: email, role: 'student'
      });
    }

    // ── Step 3: Activate coupon via Edge Function ────────────────────────────
    if (coupon && userId) {

      if (!token) {
        // No session token — shouldn't happen with email confirm OFF, but handle it
        setLoading('btn-signup', false);
        showMsg('msg-signup', 'error',
          'Account created but could not get session token. Please sign in and contact support to activate your coupon.');
        return;
      }

      const res = await fetch(
        'https://wcpbbvurfbraqqqlpsro.supabase.co/functions/v1/activate-coupon',
        {
          method: 'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({ userId, couponCode: coupon }),
        }
      );

      const result = await res.json();
      setLoading('btn-signup', false);

      if (!res.ok || result.error) {
        showMsg('msg-signup', 'error',
          (result.error || 'Coupon activation failed.') +
          ' Your account was created — contact Support for validation');
        return;
      }

      showMsg('msg-signup', 'success',
        'Account created and coupon activated! You can now sign in.');

    } else {
      // No coupon — account only
      setLoading('btn-signup', false);
      showMsg('msg-signup', 'success',
        'Account created! Sign in and subscribe to access the app.');
    }
  }

  // ── Forgot password — shows inline panel, sends reset email ───────────────
  async function doForgot() {
    const email = document.getElementById('forgot-email').value.trim();
    if (!email) {
      showMsg('msg-forgot', 'error', 'Please enter your email address.');
      return;
    }
    const btn = document.getElementById('btn-forgot');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending…';

    // Use exact current page URL (no hash/query) — must match Supabase Redirect URLs allowlist
    const redirectTo = 'https://carnaticcreatives.github.io/AbhyaSa/index.html';

    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });

    btn.disabled = false;
    btn.textContent = 'Send Reset Link';

    if (error) {
      showMsg('msg-forgot', 'error', 'Error: ' + error.message);
    } else {
      showMsg('msg-forgot', 'success',
        'Reset link sent! Check your email and click the link to set a new password.');
    }
  }

  // ── Set new password after clicking the email link ───────────────────────
  async function doResetPassword() {
    const pw  = document.getElementById('reset-password').value;
    const pw2 = document.getElementById('reset-password-confirm').value;

    if (!pw || pw.length < 8) {
      showMsg('msg-reset', 'error', 'Password must be at least 8 characters.');
      return;
    }
    if (pw !== pw2) {
      showMsg('msg-reset', 'error', 'Passwords do not match.');
      return;
    }

    const btn = document.getElementById('btn-reset');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { error } = await sb.auth.updateUser({ password: pw });

    btn.disabled = false;
    btn.textContent = 'Set New Password';

    if (error) {
      showMsg('msg-reset', 'error', 'Error: ' + error.message);
    } else {
      showMsg('msg-reset', 'success', 'Password updated! Signing you in…');
      // Sign out the recovery session so the user does a clean login
      setTimeout(async () => {
        await sb.auth.signOut();
        showPanel('login');
        showMsg('msg-login', 'success', 'Password changed. Please sign in with your new password.');
      }, 1500);
    }
  }

  // ── Show a specific panel (login / signup / forgot / reset) ─────────────
  function showPanel(name) {
    ['login','signup','forgot','reset'].forEach(p => {
      document.getElementById('panel-' + p).classList.toggle('active', p === name);
    });
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (name === 'login'));
    });
  }

  // ── Detect password recovery link on page load ───────────────────────────
  // When Supabase sends a reset email, the link contains #access_token=...&type=recovery
  // Supabase JS v2 fires an AUTH_CHANGE event with type 'PASSWORD_RECOVERY'
  // ── Detect password recovery link on page load ─────────────────────────
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.querySelector('.tabs').style.display = 'none';
      showPanel('reset');
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const loginActive  = document.getElementById('panel-login').classList.contains('active');
    const signupActive = document.getElementById('panel-signup').classList.contains('active');
    const forgotActive = document.getElementById('panel-forgot').classList.contains('active');
    const resetActive  = document.getElementById('panel-reset').classList.contains('active');
    if (loginActive)  doLogin();
    if (signupActive) doSignup();
    if (forgotActive) doForgot();
    if (resetActive)  doResetPassword();
  });

</script>
</body>
</html>
