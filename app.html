<!-- ── SESSION GUARD — must be first script, blocks everything else ───────
     Checks Supabase session + active subscription before the app loads.
     If either check fails, the user is immediately sent back to index.html.
     ──────────────────────────────────────────────────────────────────── -->
<script src="supabase.min.js"></script>
<script src="config.js"></script>
<script>

  // Hide the entire page until auth check passes
  document.documentElement.style.visibility = 'hidden';

  (async function sessionGuard() {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // 1. Check session
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    await sb.auth.setSession(session);   // ← add this line

    // 2. Check active subscription (server-side query — cannot be faked client-side)
    const { data: sub } = await sb
      .from('subscriptions')
      .select('id, expiry_date')
      .eq('user_id', session.user.id)
      .eq('status', 'active')
      .gt('expiry_date', new Date().toISOString())
      .maybeSingle();

    if (!sub) {
      // Signed in but no active subscription — send to login page
      await sb.auth.signOut();
      window.location.href = 'index.html';
      return;
    }

    // 3. Auth passed — expose user info to the app and show the page
    const userName = session.user.user_metadata?.full_name || session.user.email;
    window.__appUser = {
      id:          session.user.id,
      email:       session.user.email,
      name:        userName,
      expiryDate:  sub.expiry_date,
      supabase:    sb
    };

    // Populate menu fields before page becomes visible
    document.getElementById('bar-name').textContent   = userName;
    document.getElementById('ud-fullname').textContent = userName;
    document.getElementById('ud-email').textContent    = session.user.email;

    // Load default sruti from profiles.Sruthi — store it for later DOM application
    try {
      const { data: profile } = await sb
        .from('profiles')
        .select('Sruthi')
        .eq('id', session.user.id)
        .maybeSingle();
      if (profile?.Sruthi) {
        window.__appUser.defaultSruti = profile.Sruthi;
      }
    } catch(e) { console.warn('[Menu] Could not load default sruti:', e); }

    document.documentElement.style.visibility = 'visible';

    // Apply default sruti + init once DOM is fully ready
    function applyDefaultsAndInit() {
      // Run inits first — they may repopulate/reset dropdowns
      if (typeof scoringInit === 'function') scoringInit();
      if (typeof ragamInit === 'function') ragamInit();
      showExpiryWarning(sub.expiry_date);

      // Apply saved sruti AFTER inits so nothing can overwrite it
      const savedSruti = window.__appUser?.defaultSruti;
      if (savedSruti) {
        const srutiEl = document.getElementById('sruti');
        const udSruti = document.getElementById('ud-default-sruti-select');
        if (srutiEl) srutiEl.value = savedSruti;
        if (udSruti) udSruti.value = savedSruti;
        console.log('[Sruti] Default applied:', savedSruti);
      }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(applyDefaultsAndInit, 0);
    } else {
      window.addEventListener('DOMContentLoaded', applyDefaultsAndInit);
    }

    // ── Mid-session subscription recheck ──────────────────────────────────
    // Queries the subscriptions table live every 30 minutes.
    // If status is no longer active (expired or revoked by admin), the user
    // is signed out immediately rather than continuing indefinitely.
    async function recheckSubscription() {
      try {
        const { data: liveSub } = await sb
          .from('subscriptions')
          .select('id')
          .eq('user_id', session.user.id)
          .eq('status', 'active')
          .gt('expiry_date', new Date().toISOString())
          .maybeSingle();

        if (!liveSub) {
          // Subscription has expired or been revoked — log out and redirect
          await sb.auth.signOut();
          window.location.href = 'index.html?reason=expired';
        }
      } catch(e) {
        // Network failure — do nothing, try again next interval
      }
    }

    // Run recheck every 30 minutes
    setInterval(recheckSubscription, 30 * 60 * 1000);

    // Also recheck whenever the user returns to a background tab —
    // this catches the common case of leaving the app open overnight
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') recheckSubscription();
    });

    // ── Idle timeout — sign out after 10 minutes of inactivity ────────────
    // "Activity" = any touch, click, keypress, scroll, or mouse move.
    // The timer resets on every activity event. When it fires, Supabase
    // session is cleared and the user is sent back to index.html.
    const IDLE_MS = 10 * 60 * 1000; // 10 minutes
    let idleTimer;

    async function handleIdleTimeout() {
      try { await sb.auth.signOut(); } catch(e) { /* ignore */ }
      window.location.href = 'index.html?reason=idle';
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(handleIdleTimeout, IDLE_MS);
    }

    // Start the timer immediately and reset on any user interaction
    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'touchmove', 'scroll', 'click']
      .forEach(evt => document.addEventListener(evt, resetIdleTimer, { passive: true }));

    // Also reset when the tab becomes visible again (user switching back)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') resetIdleTimer();
    });

    resetIdleTimer(); // kick off on load

  })();
</script>

<script>

  // ── About modal ────────────────────────────────────────────────────────────
  async function showAbout() {
    if (!document.getElementById('about-modal-overlay')) {
      const overlay = document.createElement('div');
      overlay.id = 'about-modal-overlay';
      overlay.innerHTML = `
        <div id="about-modal">
          <button class="modal-close-x" onclick="document.getElementById('about-modal-overlay').classList.remove('open')">✕</button>
          <img src="abhyasa_flyer.png" alt="AbhyaSa flyer">
        </div>
      `;
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('about-modal-overlay')?.classList.remove('open');
      });
      
      document.body.appendChild(overlay);

      // Read version live from sw.js
      try {
        const swText = await fetch('sw.js').then(r => r.text());
        const match  = swText.match(/CACHE_VERSION\s*=\s*['"]([^'"]+)['"]/);
        if (match) document.getElementById('about-version').textContent = match[1];
      } catch(e) { /* non-critical */ }
    }

    document.getElementById('about-modal-overlay').classList.add('open');
  }

  // ── Pricing modal ───────────────────────────────────────────────────────────
  function showPricing() {
    if (!document.getElementById('pricing-modal-overlay')) {
      const overlay = document.createElement('div');
      overlay.id = 'pricing-modal-overlay';
      overlay.innerHTML = `
        <div id="about-modal">
          <button class="modal-close-x" onclick="document.getElementById('pricing-modal-overlay').classList.remove('open')">✕</button>
          <img src="abhyasa_pricing.png" alt="AbhyaSa Pricing Plan">
        </div>
      `;
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('pricing-modal-overlay')?.classList.remove('open');
      });
      document.body.appendChild(overlay);
    }
    document.getElementById('pricing-modal-overlay').classList.add('open');
  }
  
  // ── User menu ──────────────────────────────────────────────────────────────
  function toggleUserMenu() {
    const trigger  = document.getElementById('user-menu-trigger');
    const dropdown = document.getElementById('user-dropdown');
    const isOpen   = dropdown.classList.contains('open');
    if (isOpen) {
      closeUserMenu();
    } else {
      trigger.classList.add('open');
      dropdown.classList.add('open');
    }
  }

  function closeUserMenu() {
    document.getElementById('user-menu-trigger').classList.remove('open');
    document.getElementById('user-dropdown').classList.remove('open');
    document.getElementById('ud-sruti-row').classList.remove('open');
  }

  function toggleSrutiRow() {
    const row = document.getElementById('ud-sruti-row');
    // Show the saved default (or fall back to current main dropdown)
    const savedSruti = window.__appUser?.defaultSruti || document.getElementById('sruti')?.value;
    if (savedSruti) document.getElementById('ud-default-sruti-select').value = savedSruti;
    row.classList.toggle('open');
  }

  async function saveDefaultSruti() {
    const val = document.getElementById('ud-default-sruti-select').value;
    const u   = window.__appUser;
    if (!u?.supabase || !val) return;

    // Apply to main sruti dropdown immediately
    const srutiEl = document.getElementById('sruti');
    if (srutiEl) srutiEl.value = val;
    // Keep in-memory default in sync
    if (window.__appUser) window.__appUser.defaultSruti = val;

    // Persist to profiles.Sruthi
    try {
      const { error } = await u.supabase
        .from('profiles')
        .update({ Sruthi: val })
        .eq('id', u.id);
      if (error) throw error;
      const msg = document.getElementById('ud-sruti-msg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    } catch(e) {
      console.error('[Menu] Could not save default sruti:', e);
    }
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', e => {
    const bar = document.getElementById('user-bar');
    if (bar && !bar.contains(e.target)) closeUserMenu();
  });

  // ── Expiry warning bar ─────────────────────────────────────────────────────
  // Called from the session guard once auth passes — shows a dismissible banner
  // when the subscription expires within 30 days (urgent tone within 7 days).
  function showExpiryWarning(expiryDateStr) {
    if (!expiryDateStr) return;
    const now        = new Date();
    const expiry     = new Date(expiryDateStr);
    const daysLeft   = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));

    if (daysLeft > 30) return; // no warning needed

    const bar     = document.getElementById('expiry-warning');
    const textEl  = document.getElementById('warn-text');
    const iconEl  = document.getElementById('warn-icon');

    if (daysLeft <= 0) {
      // Shouldn't normally reach here (session guard blocks expired subs),
      // but handle gracefully just in case of clock drift.
      return;
    } else if (daysLeft <= 7) {
      bar.className = 'warn-urgent';
      iconEl.textContent = '🔔';
      textEl.textContent = daysLeft === 1
        ? 'Your access expires tomorrow — renew now to avoid interruption.'
        : `Your access expires in ${daysLeft} days — renew now to avoid interruption.`;
    } else {
      bar.className = 'warn-soon';
      iconEl.textContent = '⚠';
      textEl.textContent = `Your access expires in ${daysLeft} days.`;
    }
  }

  // ── Logout ─────────────────────────────────────────────────────────────────
  async function doLogout() {
    const u = window.__appUser;
    if (u?.supabase) await u.supabase.auth.signOut();
    window.location.href = 'index.html';
  }
</script>
